<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <title>羽球流光 (Badminton Flow) 報名系統</title>
    <!-- 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // 自定義 Tailwind 色票以符合 Vibe
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'primary': '#d9f99d', // 螢光綠
              'background': '#0f172a', // 深藍黑
            }
          }
        }
      }
    </script>
    <style>
      /* 使用自定義的顏色 */
      body {
        background-color: theme('colors.background');
        color: theme('colors.primary');
      }
    </style>
  </head>
  <body class="antialiased">
    <div class="container mx-auto p-4">
      <h1 class="text-3xl font-bold">羽球流光 (Badminton Flow)</h1>
      <p id="loading-status" class="mt-2">正在從後端載入資料...</p>

      <!-- 表單將會由 JavaScript 動態生成於此 -->
      <form id="registration-form" class="mt-8 space-y-4 hidden"></form>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        google.script.run
          .withSuccessHandler(function(dataString) {
            const data = JSON.parse(dataString);
            console.log("Data received:", data);
            document.getElementById('loading-status').textContent = '資料載入成功，準備渲染表單。';
            renderForm(data);
          })
          .withFailureHandler(function(error) {
            document.getElementById('loading-status').textContent = '資料載入失敗，請聯繫管理員。';
            console.error("Script failure:", error);
          })
          .getFormData();
      });

      function renderForm(data) {
        const form = document.getElementById('registration-form');
        const sessions = data.sessions;
        
        // 隱藏 Loading，顯示表單
        document.getElementById('loading-status').classList.add('hidden');
        form.classList.remove('hidden');

        // 1. 姓名
        form.innerHTML += `
          <div>
            <label class="block text-sm font-bold mb-1">姓名 / Name</label>
            <input type="text" name="name" required class="w-full p-2 rounded bg-slate-800 border border-primary text-white focus:outline-none focus:ring-2 focus:ring-primary">
          </div>
        `;

        // 2. 電話
        form.innerHTML += `
          <div>
            <label class="block text-sm font-bold mb-1">電話 / Phone</label>
            <input type="tel" name="phone" required class="w-full p-2 rounded bg-slate-800 border border-primary text-white focus:outline-none focus:ring-2 focus:ring-primary">
          </div>
        `;

        // 3. 場次選擇 (動態生成)
        let sessionOptions = '<option value="" disabled selected>請選擇場次</option>';
        sessions.forEach((row, index) => {
          // row: [Name, Date, Time, Total, Current, Status]
          // 格式化日期顯示 (假設 row[1] 是日期字串或物件)
          const dateStr = new Date(row[1]).toLocaleDateString('zh-TW', { month: 'numeric', day: 'numeric' });
          const remaining = row[3] - row[4];
          const label = `${row[0]} | ${dateStr} ${row[2]} (剩 ${remaining} 位)`;
          sessionOptions += `<option value="${index}">${label}</option>`;
        });

        form.innerHTML += `
          <div>
            <label class="block text-sm font-bold mb-1">報名場次 / Session</label>
            <select name="sessionIndex" required class="w-full p-2 rounded bg-slate-800 border border-primary text-white focus:outline-none focus:ring-2 focus:ring-primary">
              ${sessionOptions}
            </select>
          </div>
        `;

        // 4. 程度
        form.innerHTML += `
          <div>
            <label class="block text-sm font-bold mb-1">程度 / Level</label>
            <select name="level" required class="w-full p-2 rounded bg-slate-800 border border-primary text-white focus:outline-none focus:ring-2 focus:ring-primary">
              <option value="初級">初級 (Beginner)</option>
              <option value="中級">中級 (Intermediate)</option>
              <option value="高級">高級 (Advanced)</option>
            </select>
          </div>
        `;

        // 5. 提交按鈕
        form.innerHTML += `
          <button type="submit" class="w-full mt-4 bg-primary text-slate-900 font-bold py-3 rounded hover:bg-green-400 transition transform active:scale-95">
            提交報名 (Submit)
          </button>
        `;

        // 綁定表單提交事件 (暫時只 log)
        form.addEventListener('submit', handleFormSubmit);
      }

      function handleFormSubmit(e) {
          e.preventDefault();
          const form = e.target;
          const submitButton = form.querySelector('button[type="submit"]');

          // 禁用按鈕防止重複提交
          submitButton.disabled = true;
          submitButton.textContent = '處理中...';

          // 收集表單資料
          const formData = {
            name: form.name.value,
            phone: form.phone.value,
            sessionIndex: form.sessionIndex.value,
            level: form.level.value
          };

          google.script.run
            .withSuccessHandler(function(responseString) {
              const response = JSON.parse(responseString);
              alert(response.message); // 顯示後端回傳的訊息
              if (response.success) {
                form.reset(); // 成功後清空表單
              }
              submitButton.disabled = false; // 恢復按鈕
              submitButton.textContent = '提交報名 (Submit)';
            })
            .withFailureHandler(function(error) {
              alert('提交失敗，發生未預期的錯誤：' + error.message);
              submitButton.disabled = false; // 恢復按鈕
              submitButton.textContent = '提交報名 (Submit)';
            })
            .postRegistration(formData);
      }
    </script>
  </body>
</html>
